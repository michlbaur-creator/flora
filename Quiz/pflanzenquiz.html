<style>

    width: 100%;
    overflow: hidden;
  }

    padding: 20px 24px;
    text-align: center;
  }

  #start-screen p { color: #555; line-height: 1.5; margin-bottom: 16px; font-size: 0.92rem; }
  .setting-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 16px;
    font-size: 0.92rem;
    color: #444;
  }
  .setting-row select {
    padding: 6px 10px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 0.95rem;
    color: #333;
    background: #fafafa;
  }

  /* ── Progress bar ── */
  #progress-bar-wrap {
    height: 6px;
    background: #e8e8e8;
  }
  #progress-bar {
    height: 100%;
    background: #2d5a1b;
    transition: width 0.4s ease;
    width: 0%;
  }

  /* ── Question screen ── */
  #question-screen { display: none; }

  #question-header {
    padding: 14px 20px 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #f0f0f0;
  }
  #question-counter { font-size: 0.85rem; color: #888; }
  #score-display { font-size: 0.85rem; color: #2d5a1b; font-weight: bold; }

  #photo-wrap {
    background: #111;
    position: relative;
    min-height: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #plant-photo {
    width: 100%;
    max-height: 260px;
    object-fit: cover;
    display: block;
    transition: opacity 0.3s;
  }
  #loading-spinner {
    position: absolute;
    color: #aaa;
    font-size: 0.9rem;
    font-style: italic;
  }

  #question-text {
    padding: 10px 16px 6px;
    font-size: 0.95rem;
    color: #333;
    text-align: center;
  }

  #answers {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    padding: 8px 14px 14px;
  }

  .answer-btn {
    background: #f4f1eb;
    border: 2px solid #ddd;
    border-radius: 8px;
    padding: 9px 8px;
    font-size: 0.85rem;
    font-family: Georgia, serif;
    color: #333;
    cursor: pointer;
    text-align: center;
    line-height: 1.3;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;

  .answer-btn:hover:not(:disabled) {

  }
  .answer-btn.correct {

  }

    color: #721c24;
  }

    <div id="answers"></div>
    <div id="feedback"></div>
    <button id="next-btn" onclick="nextQuestion()">Weiter →</button>
  </div>

  <!-- ══ RESULT SCREEN ══ -->

    <h2>Ergebnis</h2>
    <div id="result-score"></div>
    <div id="result-msg"></div>
    <div id="result-detail"></div>
    <div id="wrong-list"><h3>Nicht erkannt:</h3><div id="wrong-items"></div></div>
    <button class="btn-primary" onclick="resetQuiz()">Nochmal spielen</button>
  </div>

</div>

// ═══════════════════════════════════════════════════
//  HILFSFUNKTIONEN
// ═══════════════════════════════════════════════════

function shuffle(arr) {
  // Fisher-Yates-Shuffle: zufällige Reihenfolge
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function fotoUrl(slug, nr = 1) {
  return `https://flora.mibaso.de/images/fotos/${slug}-${nr}.jpg`;
}

// ═══════════════════════════════════════════════════
//  SPIELZUSTAND
// ═══════════════════════════════════════════════════

let questions = [];   // die zufällig gewählten Arten für diese Runde
let current = 0;      // aktueller Frageindex
let score = 0;        // richtige Antworten
let answered = false; // wurde die aktuelle Frage schon beantwortet?
let wrongAnswers = []; // falsch beantwortete für Auswertung
let totalQ = 10;

// ═══════════════════════════════════════════════════
//  QUIZ STARTEN
// ═══════════════════════════════════════════════════

function startQuiz() {
  totalQ = parseInt(document.getElementById('num-q').value);
  questions = shuffle(ARTEN).slice(0, totalQ);
  current = 0;
  score = 0;
  answered = false;
  wrongAnswers = [];

  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('question-screen').style.display = 'block';

  showQuestion();
}

// ═══════════════════════════════════════════════════
//  FRAGE ANZEIGEN
// ═══════════════════════════════════════════════════

function showQuestion() {
  answered = false;
  const art = questions[current];

  // Fortschrittsbalken
  document.getElementById('progress-bar').style.width =
    ((current / totalQ) * 100) + '%';

  // Zähler & Score
  document.getElementById('question-counter').textContent =
    `Frage ${current + 1} / ${totalQ}`;
  document.getElementById('score-display').textContent = `✓ ${score}`;

  // Feedback zurücksetzen
  document.getElementById('feedback').textContent = '';
  document.getElementById('next-btn').style.display = 'none';

  // Foto laden
  const img = document.getElementById('plant-photo');
  const spinner = document.getElementById('loading-spinner');
  img.style.opacity = 0;
  spinner.style.display = 'block';
  img.src = fotoUrl(art.slug, 1);

  // 4 Antwortoptionen: 1 richtig + 3 zufällige Falsche
  const falsche = shuffle(ARTEN.filter(a => a.slug !== art.slug)).slice(0, 3);
  const optionen = shuffle([art, ...falsche]);

  const container = document.getElementById('answers');
  container.innerHTML = '';
  optionen.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'answer-btn';
    btn.innerHTML = `<strong>${opt.name}</strong><br><em style="font-size:0.8rem;color:#888">${opt.latein}</em>`;
    btn.onclick = () => checkAnswer(opt.slug === art.slug, btn, art);
    container.appendChild(btn);
  });
}

  document.getElementById('plant-photo').style.opacity = 1;
}

function photoError() {
  // Falls Foto-1 nicht vorhanden, versuche Tafel als Fallback
  // (Tafel hat zwar den Namen, aber besser als leeres Bild)
  const art = questions[current];
  const img = document.getElementById('plant-photo');
  if (!img.src.includes('tafeln')) {
    img.src = `https://flora.mibaso.de/images/tafeln/${art.slug}.jpg`;
  } else {
    document.getElementById('loading-spinner').textContent = '(kein Foto verfügbar)';
  }
}

// ═══════════════════════════════════════════════════
//  ANTWORT PRÜFEN
// ═══════════════════════════════════════════════════

function checkAnswer(isCorrect, clickedBtn, art) {
  if (answered) return;
  answered = true;

  // Alle Buttons markieren
  const buttons = document.querySelectorAll('.answer-btn');
  buttons.forEach(btn => {
    btn.disabled = true;
    // Richtigen Button grün einfärben
    if (btn.innerHTML.includes(`>${art.name}<`)) {
      btn.classList.add('correct');
    }
  });

  if (isCorrect) {
    score++;
    document.getElementById('feedback').textContent = '✓ Richtig!';
    document.getElementById('score-display').textContent = `✓ ${score}`;
  } else {
    clickedBtn.classList.add('wrong');
    document.getElementById('feedback').textContent =
      `✗ Es war: ${art.name}`;
    wrongAnswers.push({ art, given: clickedBtn.querySelector('strong').textContent });
  }

  document.getElementById('next-btn').style.display = 'block';
}

// ═══════════════════════════════════════════════════
//  NÄCHSTE FRAGE / ERGEBNIS
// ═══════════════════════════════════════════════════

function nextQuestion() {
  current++;
  if (current >= totalQ) {
    showResult();
  } else {
    showQuestion();
  }
}

// ═══════════════════════════════════════════════════
//  ERGEBNIS ANZEIGEN
// ═══════════════════════════════════════════════════

function showResult() {
  document.getElementById('question-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'block';
  document.getElementById('progress-bar').style.width = '100%';

  document.getElementById('result-score').textContent =
    `${score} / ${totalQ}`;

  // Bewertungstext
  const pct = score / totalQ;
  let msg = '';
  if (pct === 1)       msg = 'Perfekt! Du kennst alle Pflanzen der Region. 🌿';
  else if (pct >= 0.8) msg = 'Sehr gut! Fast alles erkannt.';
  else if (pct >= 0.6) msg = 'Gut! Mit etwas Übung kennst du bald alle.';
  else if (pct >= 0.4) msg = 'Nicht schlecht — die nächste Exkursion bringt mehr Sicherheit.';
  else                 msg = 'Noch viel zu entdecken — perfekt für die nächste Exkursion!';

  document.getElementById('result-msg').textContent = msg;
  document.getElementById('result-detail').textContent =
    `${score} richtig, ${totalQ - score} nicht erkannt`;

  // Falsche Antworten auflisten
  const wrongList = document.getElementById('wrong-list');
  const wrongItems = document.getElementById('wrong-items');
  wrongItems.innerHTML = '';

  if (wrongAnswers.length > 0) {
    wrongList.style.display = 'block';
    wrongAnswers.forEach(w => {
      const div = document.createElement('div');
      div.className = 'wrong-item';
      div.innerHTML = `
        <img src="${fotoUrl(w.art.slug)}" alt="${w.art.name}"
             onerror="this.src='https://flora.mibaso.de/images/tafeln/${w.art.slug}.jpg'">
        <div class="wi-names">
          <div class="wi-correct">${w.art.name}</div>
          <div class="wi-given">Du tipptest: ${w.given}</div>
        </div>
      `;
      wrongItems.appendChild(div);
    });
  } else {
    wrongList.style.display = 'none';
  }
}

// ═══════════════════════════════════════════════════
//  QUIZ ZURÜCKSETZEN
// ═══════════════════════════════════════════════════

function resetQuiz() {
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('start-screen').style.display = 'block';
  document.getElementById('progress-bar').style.width = '0%';
}
</script>
