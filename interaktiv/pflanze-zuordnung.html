<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#2F4F3E">
<link rel="manifest" href="../manifest.webmanifest">
<link rel="icon" href="../assets/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="../assets/apple-touch-icon.png">

<title>Pflanzenkunde Quiz</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body {
  font-family:Georgia,"Times New Roman",serif;
  background:#f4f1eb;
  min-height:100vh;
  padding:18px 10px 24px;
}
h1      { display:none; }
.subtitle { display:none; }

.img-card {
  background:#fff;
  border-radius:14px;
  box-shadow:0 4px 18px rgba(0,0,0,.12);
  padding:10px;
  max-width:440px;
  width:100%;
  margin:0 auto 14px;
}
.img-wrap { position:relative; }
.img-wrap img {
  width:100%; height:auto; display:block;
  border-radius:6px; -webkit-user-drag:none;
}

.cover-line {
  position:absolute;
  left:43%;
  width:51%;
  top:26.0%;
  height:3.2%;
  background:#ffffff;
  pointer-events:none;
  z-index:8;
}

/* Drop zones */
.dz {
  position:absolute;
  left:72%; width:22%; height:3.4%;
  transform:translateY(-50%);
  z-index:10;
  background:#fff;
  border:1.5px solid #a8c4a0;
  border-radius:8px;
  display:flex; align-items:center; justify-content:center;
  font-size:.75rem; font-weight:700; color:#8aab82;
  user-select:none; white-space:nowrap; cursor:default;
  transition:background .15s, border-color .15s, color .15s;
  overflow:hidden;
  font-family:Georgia,serif;
}
.dz.drag-over { background:#3A5F4A; border:2px solid #2a4a38; color:#ffffff; }
.dz.correct   { background:#3A5F4A; border:2px solid #2a4a38; color:#ffffff; font-weight:800; animation:pop .28s ease; }
.dz.wrong     { background:#ffcdd2; border:2px solid #e53935; color:#b71c1c; animation:shake .3s; }
@keyframes pop   { 0%,100%{transform:translateY(-50%) scale(1)}   50%{transform:translateY(-50%) scale(1.07)} }
@keyframes shake { 0%,100%{transform:translateY(-50%) translateX(0)} 30%{transform:translateY(-50%) translateX(-4px)} 70%{transform:translateY(-50%) translateX(4px)} }

/* Wortkasten */
.word-bank {
  max-width:440px; margin:0 auto 14px;
  background:#edeae3;
  border-radius:14px;
  box-shadow:0 2px 10px rgba(0,0,0,.08);
  padding:14px 16px; text-align:center;
}
.word-bank h3 { font-size:.78rem; color:#5a7a52; margin-bottom:10px; font-family:Georgia,serif; }
#chips { display:flex; flex-wrap:wrap; justify-content:center; gap:10px; min-height:44px; }
.chip {
  background:#fff;
  color:#3A5F4A;
  border:2px solid #3A5F4A;
  border-radius:20px; padding:10px 20px;
  font-size:.88rem; font-weight:700; cursor:grab; min-height:44px; display:inline-flex; align-items:center;
  box-shadow:0 2px 6px rgba(58,95,74,.12);
  transition:transform .15s, opacity .2s, background .15s;
  user-select:none;
  font-family:Georgia,serif;
}
.chip:hover { transform:translateY(-2px); background:#f0f7f2; }
.chip.used  { opacity:.2; pointer-events:none; }

/* Steuerung */
.controls { max-width:440px; margin:0 auto; text-align:center; }
.score-line { font-size:.9rem; color:#555; margin-bottom:6px; font-family:Georgia,serif; }
.score-line b { font-size:1.2rem; color:#3A5F4A; }
.progress {
  background:#d9d4c7; border-radius:6px; height:6px;
  max-width:280px; margin:0 auto 12px; overflow:hidden;
}
.progress-fill {
  background:linear-gradient(90deg,#6a9e7f,#3A5F4A);
  height:100%; width:0; border-radius:6px; transition:width .4s;
}
.btn {
  border:none; border-radius:22px; padding:11px 26px;
  font-size:.88rem; font-weight:700; cursor:pointer; margin:4px;
  transition:transform .15s, box-shadow .15s;
  font-family:Georgia,serif;
  letter-spacing:.3px;
}
.btn:hover { transform:translateY(-2px); box-shadow:0 4px 12px rgba(0,0,0,.15); }
.btn-reset { background:#3A5F4A; color:#ffffff; border:2px solid #2a4a38; }
.btn-hint  { background:#fff; color:#3A5F4A; border:2px solid #3A5F4A; }
.success-msg {
  display:none; color:#3A5F4A; font-weight:700; font-size:1rem;
  margin-top:12px; font-family:Georgia,serif;
}
</style>
</head>

    <!-- Linie + Kästchen der 4. Position abdecken – startet rechts vom Stängel (43 %) -->
    <div class="cover-line"></div>

  <div class="dz" data-answer="Kronblatt" style="top:13.0%;"></div>
  <div class="dz" data-answer="Staubblatt" style="top:18.2%;"></div>
  <div class="dz" data-answer="Kelch" style="top:23.2%;"></div>
  <div class="dz" data-answer="Blatt" style="top:50.7%;"></div>
  <div class="dz" data-answer="Stängel" style="top:63.5%;"></div>
  <div class="dz" data-answer="Wurzel" style="top:81.9%;"></div>
  </div>
</div>

<div class="word-bank">
  <h3>📦 Wortkasten</h3>
  <div id="chips"></div>
</div>

<div class="controls">
  <div class="score-line">Richtig: <b id="scoreNum">0</b> / 6</div>
  <div class="progress"><div class="progress-fill" id="progFill"></div></div>
  <button class="btn btn-hint"  onclick="giveHint()">💡 Tipp</button>
  <button class="btn btn-reset" onclick="resetQuiz()">↺ Neu starten</button>
  <div class="success-msg" id="successMsg">🎉 Perfekt – alle 6 Teile richtig!</div>
</div>

<script>
const TERMS=["Kronblatt", "Staubblatt", "Kelch", "Blatt", "Stängel", "Wurzel"],TOTAL=TERMS.length;
let score=0,hintsUsed=0,dragging=null,touchClone=null,offX=0,offY=0;
function shuffle(a){return[...a].sort(()=>Math.random()-.5);}
function buildChips(){
  const c=document.getElementById('chips');c.innerHTML='';
  shuffle(TERMS).forEach(t=>{
    const el=document.createElement('div');
    el.className='chip';el.id='chip-'+t;el.textContent=t;
    el.draggable=true;el.dataset.term=t;
    el.addEventListener('dragstart',e=>{dragging=t;el.style.opacity='.35';e.dataTransfer.effectAllowed='move';});
    el.addEventListener('dragend',()=>el.style.opacity='');
    el.addEventListener('touchstart',onTS,{passive:true});
    el.addEventListener('touchmove',onTM,{passive:false});
    el.addEventListener('touchend',onTE);
    c.appendChild(el);
  });
}
function initZones(){
  document.querySelectorAll('.dz').forEach(z=>{
    z.textContent='?';
    z.addEventListener('dragover',e=>{e.preventDefault();if(!z.classList.contains('correct'))z.classList.add('drag-over');});
    z.addEventListener('dragleave',()=>z.classList.remove('drag-over'));
    z.addEventListener('drop',e=>{e.preventDefault();z.classList.remove('drag-over');if(!z.classList.contains('correct'))tryDrop(z);});
  });
}
function tryDrop(zone){
  if(!dragging)return;
  if(dragging===zone.dataset.answer){
    zone.textContent=dragging;zone.classList.add('correct');
    const chip=document.getElementById('chip-'+dragging);if(chip)chip.classList.add('used');
    score++;document.getElementById('scoreNum').textContent=score;
    document.getElementById('progFill').style.width=(score/TOTAL*100)+'%';
    if(score===TOTAL)document.getElementById('successMsg').style.display='block';
  }else{
    zone.classList.add('wrong');const prev=zone.textContent;zone.textContent='✗';
    setTimeout(()=>{zone.classList.remove('wrong');if(!zone.classList.contains('correct'))zone.textContent=prev;},800);
  }
  dragging=null;
}
function onTS(e){
  const el=e.currentTarget;dragging=el.dataset.term;
  const r=el.getBoundingClientRect();offX=e.touches[0].clientX-r.left;offY=e.touches[0].clientY-r.top;
  touchClone=el.cloneNode(true);
  touchClone.style.cssText='position:fixed;z-index:9999;pointer-events:none;opacity:.85;width:'+r.width+'px;left:'+r.left+'px;top:'+r.top+'px;margin:0;';
  document.body.appendChild(touchClone);
}
function onTM(e){
  e.preventDefault();if(!touchClone)return;
  touchClone.style.left=(e.touches[0].clientX-offX)+'px';touchClone.style.top=(e.touches[0].clientY-offY)+'px';
  document.querySelectorAll('.dz').forEach(z=>z.classList.remove('drag-over'));
  const u=document.elementFromPoint(e.touches[0].clientX,e.touches[0].clientY);
  if(u&&u.classList.contains('dz')&&!u.classList.contains('correct'))u.classList.add('drag-over');
}
function onTE(e){
  if(touchClone){touchClone.remove();touchClone=null;}
  document.querySelectorAll('.dz').forEach(z=>z.classList.remove('drag-over'));
  const u=document.elementFromPoint(e.changedTouches[0].clientX,e.changedTouches[0].clientY);
  if(u&&u.classList.contains('dz')&&!u.classList.contains('correct'))tryDrop(u);
  dragging=null;
}
function giveHint(){
  if(hintsUsed>=3)return;
  const open=[...document.querySelectorAll('.dz')].filter(z=>!z.classList.contains('correct'));
  if(!open.length)return;
  const zone=open[Math.floor(Math.random()*open.length)];
  const ans=zone.dataset.answer;zone.textContent=ans;zone.classList.add('correct');
  const chip=document.getElementById('chip-'+ans);if(chip)chip.classList.add('used');
  score++;hintsUsed++;document.getElementById('scoreNum').textContent=score;
  document.getElementById('progFill').style.width=(score/TOTAL*100)+'%';
  if(score===TOTAL)document.getElementById('successMsg').style.display='block';
}
function resetQuiz(){
  score=0;hintsUsed=0;
  document.getElementById('scoreNum').textContent=0;
  document.getElementById('progFill').style.width='0%';
  document.getElementById('successMsg').style.display='none';
  document.querySelectorAll('.dz').forEach(z=>{z.className='dz';z.textContent='?';});
  buildChips();
}
buildChips();initZones();
</script>
</body>
