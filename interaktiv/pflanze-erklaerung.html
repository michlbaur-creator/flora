  from{opacity:0;transform:scale(.95);}
  to  {opacity:1;transform:scale(1);}
}

  <div class="ph-btn" id="ph-btn-bluete"
       style="left:calc(33% - 14px);top:calc(9% - 14px);"
       data-label="Blüte"
       data-text="Der große Auftritt! Die Kronblätter sind das bunte Schaufenster der Pflanze – sie locken Bienen, Schmetterlinge und Co. mit Farbe und Duft an. Ohne sie kein Besuch, ohne Besuch keine Bestäubung."
       onclick="phToggle(this)"
       role="button" aria-label="Blüte anzeigen">
  </div>
  <div class="ph-btn" id="ph-btn-narbe"
       style="left:calc(46% - 14px);top:calc(10% - 14px);"
       data-label="Narbe"
       data-text="Klebrig, aber mit Absicht! Die Narbe ist der Empfangsschalter des Stempels. Hier landet der Pollen anreisender Bestäuber und haftet sofort fest – kein Entkommen mehr."
       onclick="phToggle(this)"
       role="button" aria-label="Narbe anzeigen">
  </div>
  <div class="ph-btn" id="ph-btn-staubblatt"
       style="left:calc(39% - 14px);top:calc(15% - 14px);"
       data-label="Staubblatt"
       data-text="Die Pollenkanone! Das Staubblatt besteht aus dem Staubbeutel oben (hier wird Pollen produziert) und dem Staubfaden unten (der hält alles in Position). Zusammen das männliche Organ der Blüte."
       onclick="phToggle(this)"
       role="button" aria-label="Staubblatt anzeigen">
  </div>
  <div class="ph-btn" id="ph-btn-fruchtknoten"
       style="left:calc(43% - 14px);top:calc(19% - 14px);"
       data-label="Fruchtknoten"
       data-text="Die Schatztruhe der Pflanze. Im Fruchtknoten liegen die Samenanlagen gut geschützt. Nach erfolgreicher Bestäubung wird aus ihm die Frucht – aus den Samenanlagen die Samen."
       onclick="phToggle(this)"
       role="button" aria-label="Fruchtknoten anzeigen">
  </div>
  <div class="ph-btn" id="ph-btn-kelchblatt"
       style="left:calc(52% - 14px);top:calc(21% - 14px);"
       data-label="Kelchblatt"
       data-text="Der grüne Bodyguard! Die Kelchblätter hüllen die Blütenknospe ein und schützen sie, solange sie noch zart und verletzlich ist. Wenn die Blüte aufgeht, treten sie einen Schritt zurück."
       onclick="phToggle(this)"
       role="button" aria-label="Kelchblatt anzeigen">
  </div>
  <div class="ph-btn" id="ph-btn-staengel"
       style="left:calc(44% - 14px);top:calc(45% - 14px);"
       data-label="Stängel"
       data-text="Das Rückgrat der Pflanze – buchstäblich. Der Stängel hält alles aufrecht und ist gleichzeitig die Autobahn für Wasser und Nährstoffe: von der Wurzel nach oben in die Blüte, von den Blättern nach unten."
       onclick="phToggle(this)"
       role="button" aria-label="Stängel anzeigen">
  </div>
  <div class="ph-btn" id="ph-btn-blatt"
       style="left:calc(67% - 14px);top:calc(52% - 14px);"
       data-label="Blatt"
       data-text="Die grüne Solaranlage. Mit Sonnenlicht, Wasser und CO₂ produziert das Blatt Zucker – der Treibstoff für die gesamte Pflanze. Nebenbei gibt es Sauerstoff ab. Die Pflanze also, die uns am Leben hält."
       onclick="phToggle(this)"
       role="button" aria-label="Blatt anzeigen">
  </div>
  <div class="ph-btn" id="ph-btn-wurzel"
       style="left:calc(62% - 14px);top:calc(83% - 14px);"
       data-label="Wurzel"
       data-text="Unsichtbar, aber unverzichtbar. Die Wurzel verankert die Pflanze fest im Boden und saugt dabei fleißig Wasser und gelöste Mineralien auf. Ihr ganzes Leben spielt sich im Verborgenen ab – und das ist gut so."
       onclick="phToggle(this)"
       role="button" aria-label="Wurzel anzeigen">
  </div>
    <!-- Einziger globaler Tooltip – nach allen Kreisen im DOM -->
    <div class="ph-tooltip" id="ph-tooltip">
      <div class="ph-tip-head" id="ph-tip-head"></div>
      <div class="ph-tip-body" id="ph-tip-body"></div>
    </div>
  </div>
</div>

<script>
(function(){
  var openBtn  = null;
  var tooltip  = document.getElementById('ph-tooltip');
  var tipHead  = document.getElementById('ph-tip-head');
  var tipBody  = document.getElementById('ph-tip-body');
  var wrap     = document.getElementById('ph-wrap');
  var TW       = 200;   // tooltip width in px (matches CSS)
  var MARGIN   = 6;     // min gap to wrap edge

  function closeAll(){
    if(openBtn){ openBtn.classList.remove('ph-open'); openBtn = null; }
    tooltip.classList.remove('ph-show');
  }

  window.phToggle = function(btn){
    if(btn === openBtn){ closeAll(); return; }
    closeAll();

    tipHead.textContent = btn.dataset.label;
    tipBody.textContent = btn.dataset.text;
    btn.classList.add('ph-open');
    openBtn = btn;
    tooltip.classList.add('ph-show');

    var wr = wrap.getBoundingClientRect();
    var br = btn.getBoundingClientRect();

    // Kreis-Mittelpunkt relativ zu wrap
    var cx = br.left - wr.left + br.width  / 2;
    var cy = br.top  - wr.top  + br.height / 2;
    var th = tooltip.offsetHeight;

    // Horizontal: bevorzugt rechts vom Kreis, sonst links
    var tx = cx - 8;                        // 8px links vom Mittelpunkt → überdeckt Kreis
    if(tx + TW > wr.width - MARGIN){       // würde rechts rausgehen?
      tx = cx - TW + 8;                     // dann nach links aufklappen
    }
    if(tx < MARGIN) tx = MARGIN;            // niemals links rausgehen

    // Vertikal: vertikal zentriert am Kreis, aber innerhalb wrap
    var ty = cy - th / 2;
    if(ty < MARGIN) ty = MARGIN;
    if(ty + th > wr.height - MARGIN) ty = wr.height - th - MARGIN;

    tooltip.style.left = tx + 'px';
    tooltip.style.top  = ty + 'px';
  };

  document.addEventListener('click', function(e){
    if(!e.target.closest('#ph-root .ph-btn') &&
       !e.target.closest('#ph-tooltip')) closeAll();
  });
})();
</script>
