<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#2F4F3E">
<link rel="manifest" href="../manifest.webmanifest">
<link rel="icon" href="../assets/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="../assets/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Mibaso Natur">
<title>Bestäubung – Erklärungs-Grafik</title>
<style>
  #bestaeubung1-app, #bestaeubung1-app * { box-sizing: border-box; }
  #bestaeubung1-app {
    font-family: Georgia, serif;
    color: #2c2c2c;
    background: #f8f5f0;
    padding: 8px 0 14px;
    -webkit-hyphens: auto;
    hyphens: auto;
  }

  #bestaeubung1-app #diagram-box {
    background: white;
    border-radius: 12px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.10);
    margin: 0 10px 10px;
    overflow: hidden;
  }

  #bestaeubung1-app #diagram-wrap {
    position: relative;
    width: 100%;
    background: #fdf8f2;
    line-height: 0;
    user-select: none;
    -webkit-user-select: none;
  }
  #bestaeubung1-app #diagram-wrap img {
    display: block;
    width: 100%;
    height: auto;
    pointer-events: none;
  }

  /* Clickable number hotspots */
  #bestaeubung1-app .num-btn {
    position: absolute;
    width: 9%;
    /* height = padding-bottom trick for circle */
    padding-bottom: 0;
    height: 7%;
    border-radius: 50%;
    background: transparent;
    border: 2.5px solid transparent;
    cursor: pointer;
    transition: border-color 0.18s, background 0.18s, transform 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #bestaeubung1-app .num-btn:hover {
    border-color: rgba(58,95,74,0.55);
    background: rgba(232,244,237,0.50);
    transform: scale(1.12);
  }
  #bestaeubung1-app .num-btn:active {
    transform: scale(1.05);
    background: rgba(212,237,218,0.70);
    border-color: rgba(47,79,62,0.8);
  }

  /* Pulse ring animation on load */
  @keyframes pulseRing {
    0%   { box-shadow: 0 0 0 0 rgba(58,95,74,0.45); }
    70%  { box-shadow: 0 0 0 8px rgba(58,95,74,0); }
    100% { box-shadow: 0 0 0 0 rgba(58,95,74,0); }
  }
  #bestaeubung1-app .num-btn.pulse {
    animation: pulseRing 1.6s ease-out 1;
  }

  /* Copyright line */
  #bestaeubung1-app #hint-bar {
    text-align: center;
    padding: 6px 14px 8px;
    font-size: 0.66rem;
    color: #aaa;
    background: #f4f1eb;
    border-top: 1px solid #e8e0d4;
    letter-spacing: 0.02em;
  }

  /* ── Modal overlay ── */
  #bestaeubung1-app #modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(30,30,20,0.52);
    z-index: 9000;
    align-items: center;
    justify-content: center;
    padding: 16px;
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
  }
  #bestaeubung1-app #modal-overlay.open {
    display: flex;
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.88) translateY(10px); }
    to   { opacity: 1; transform: scale(1)    translateY(0); }
  }
  #bestaeubung1-app #modal-box {
    background: white;
    border-radius: 16px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.22);
    max-width: 420px;
    width: 100%;
    padding: 0;
    overflow: hidden;
    animation: modalIn 0.22s ease-out forwards;
  }

  #bestaeubung1-app #modal-header {
    background: #3A5F4A;
    padding: 18px 20px 14px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  #bestaeubung1-app #modal-badge {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: white;
    color: #2F4F3E;
    font-size: 1.3rem;
    font-weight: bold;
    font-family: Georgia, serif;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  #bestaeubung1-app #modal-title {
    color: white;
    font-size: 1.08rem;
    font-weight: bold;
    font-family: Georgia, serif;
    line-height: 1.2;
    flex: 1;
  }

  #bestaeubung1-app #modal-body {
    padding: 18px 22px 22px;
    font-size: 0.97rem;
    line-height: 1.55;
    color: #333;
  }
  #bestaeubung1-app #modal-body strong {
    color: #2F4F3E;
  }

  #bestaeubung1-app #modal-footer {
    padding: 0 22px 18px;
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }
  #bestaeubung1-app .modal-nav-btn {
    font-family: Georgia, serif;
    font-size: 0.85rem;
    font-weight: bold;
    padding: 7px 14px;
    border-radius: 20px;
    border: 1.5px solid #3A5F4A;
    cursor: pointer;
    background: white;
    color: #3A5F4A;
    transition: background 0.14s, transform 0.1s;
  }
  #bestaeubung1-app .modal-nav-btn:hover { background: #f0f6f1; }
  #bestaeubung1-app .modal-nav-btn:active { transform: scale(0.97); }
  #bestaeubung1-app #modal-close-btn {
    font-family: Georgia, serif;
    font-size: 0.85rem;
    font-weight: bold;
    padding: 7px 18px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
    background: #3A5F4A;
    color: white;
    transition: background 0.14s, transform 0.1s;
  }
  #bestaeubung1-app #modal-close-btn:hover { background: #2F4F3E; }
  #bestaeubung1-app #modal-close-btn:active { transform: scale(0.97); }

  @media (max-width: 520px) {
    #bestaeubung1-app #modal-badge { width: 36px; height: 36px; font-size: 1.1rem; }
    #bestaeubung1-app #modal-title { font-size: 0.97rem; }
    #bestaeubung1-app #modal-body  { font-size: 0.9rem; padding: 14px 16px 16px; }
    #bestaeubung1-app #modal-footer { padding: 0 16px 14px; }
    #bestaeubung1-app #diagram-box { margin: 0 6px 8px; }
  }
</style>
</head>

<script>
(function() {
  const steps = [
    {
      num: 1,
      title: "Staubbeutel",
      body: "Hier wird der Pollen produziert und freigesetzt. Der Staubbeutel ist Teil des männlichen Blütenorgans und enthält unzählige Pollenkörner."
    },
    {
      num: 2,
      title: "Pollenübertragung",
      body: "Der Transport übernimmt die <strong>Biene</strong>. Sie streift am Staubbeutel vorbei und nimmt Pollenkörner auf, die sie zur nächsten Blüte trägt."
    },
    {
      num: 3,
      title: "Bestäubung",
      body: "Der entscheidende Moment: Pollen landet auf der klebrigen <strong>Narbe</strong>. Die Narbe ist der obere Teil des weiblichen Blütenorgans und sorgt dafür, dass der Pollen haftet."
    },
    {
      num: 4,
      title: "Pollenschlauchwachstum",
      body: "Der Pollen keimt und wächst durch den <strong>Griffel</strong> nach unten. Dieser Schlauch ist der Transportweg für die männlichen Keimzellen in Richtung Fruchtknoten."
    },
    {
      num: 5,
      title: "Befruchtung",
      body: "Die Verschmelzung im <strong>Fruchtknoten</strong>. Sobald der Pollenschlauch die Samenanlage erreicht, verschmelzen männliche und weibliche Keimzelle zu einer neuen Zelle."
    },
    {
      num: 6,
      title: "Samenanlage",
      body: "Die befruchtete Eizelle entwickelt sich nun zum <strong>Samen</strong>. In der Samenanlage liegt die weibliche Keimzelle, aus der nach erfolgreicher Befruchtung der Samen heranreift."
    },
    {
      num: 7,
      title: "Frucht (Fruchtfleisch)",
      body: "Die Wand des Fruchtknotens schwillt zur schmackhaften Hülle an. Diese Frucht umhüllt und schützt den Samen – und lockt Tiere an, die beim Verbreiten der Samen helfen."
    },
    {
      num: 8,
      title: "Samen (Keimling)",
      body: "Das Endprodukt, das den Bauplan für die nächste Generation enthält. Im Samen steckt der Keimling mit allen Informationen für eine neue Pflanze."
    }
  ];

  const app      = document.getElementById('bestaeubung1-app');
  const overlay  = app.querySelector('#modal-overlay');
  const badge    = app.querySelector('#modal-badge');
  const title    = app.querySelector('#modal-title');
  const body     = app.querySelector('#modal-body');
  const prevBtn  = app.querySelector('#modal-prev');
  const nextBtn  = app.querySelector('#modal-next');
  const closeBtn = app.querySelector('#modal-close-btn');

  let currentIdx = 0;

  function openModal(idx) {
    currentIdx = idx;
    const s = steps[idx];
    badge.textContent = s.num;
    title.textContent = s.title;
    body.innerHTML    = s.body;
    // update nav buttons
    prevBtn.disabled  = (idx === 0);
    prevBtn.style.opacity = (idx === 0) ? '0.35' : '1';
    nextBtn.disabled  = (idx === steps.length - 1);
    nextBtn.style.opacity = (idx === steps.length - 1) ? '0.35' : '1';
    overlay.classList.add('open');
    sendHeight();
  }

  function closeModal() {
    overlay.classList.remove('open');
    sendHeight();
  }

  // Hotspot click handlers
  app.querySelectorAll('.num-btn').forEach(btn => {
    const num = parseInt(btn.dataset.num, 10);
    btn.addEventListener('click', () => {
      // pulse effect
      btn.classList.remove('pulse');
      void btn.offsetWidth; // reflow
      btn.classList.add('pulse');
      openModal(num - 1);
    });
  });

  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) closeModal();
  });
  closeBtn.addEventListener('click', closeModal);
  prevBtn.addEventListener('click', () => { if (currentIdx > 0) openModal(currentIdx - 1); });
  nextBtn.addEventListener('click', () => { if (currentIdx < steps.length - 1) openModal(currentIdx + 1); });

  // Keyboard support
  document.addEventListener('keydown', (e) => {
    if (!overlay.classList.contains('open')) return;
    if (e.key === 'Escape') closeModal();
    if (e.key === 'ArrowLeft'  && currentIdx > 0)               openModal(currentIdx - 1);
    if (e.key === 'ArrowRight' && currentIdx < steps.length - 1) openModal(currentIdx + 1);
  });

  function sendHeight() {
    const h = app.offsetHeight + 20;
    try { window.parent.postMessage({ quizHeight: h }, '*'); } catch(_) {}
  }
  window.addEventListener('load', sendHeight);
  window.addEventListener('resize', sendHeight);
  const mo = new MutationObserver(sendHeight);
  mo.observe(app, { childList: true, subtree: true, attributes: true });

  const img = app.querySelector('#diagram-wrap img');
  if (img) {
    if (img.complete) sendHeight();
    else img.addEventListener('load', sendHeight);
  }
})();
</script>

</body>
</html>
