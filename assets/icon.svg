<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Hintergrund (abgerundet, warmes Beige) -->
  <rect width="512" height="512" rx="96" fill="#fbf6ed"/>

  <!-- Stilisierte Blüte in Dunkelgrün -->
  <g transform="translate(256 256)">
    <!-- 6 Blütenblätter -->
    <g fill="#2F4F3E">
      <ellipse cx="0" cy="-110" rx="58" ry="92"/>
      <g transform="rotate(60)">  <ellipse cx="0" cy="-110" rx="58" ry="92"/></g>
      <g transform="rotate(120)"> <ellipse cx="0" cy="-110" rx="58" ry="92"/></g>
      <g transform="rotate(180)"> <ellipse cx="0" cy="-110" rx="58" ry="92"/></g>
      <g transform="rotate(240)"> <ellipse cx="0" cy="-110" rx="58" ry="92"/></g>
      <g transform="rotate(300)"> <ellipse cx="0" cy="-110" rx="58" ry="92"/></g>
    </g>
    <!-- Inneres Highlight (heller Grünton, schlichtes Schichtenspiel) -->
    <g fill="#5A8068" opacity="0.55">
      <ellipse cx="0" cy="-90" rx="34" ry="58"/>
      <g transform="rotate(60)">  <ellipse cx="0" cy="-90" rx="34" ry="58"/></g>
      <g transform="rotate(120)"> <ellipse cx="0" cy="-90" rx="34" ry="58"/></g>
      <g transform="rotate(180)"> <ellipse cx="0" cy="-90" rx="34" ry="58"/></g>
      <g transform="rotate(240)"> <ellipse cx="0" cy="-90" rx="34" ry="58"/></g>
      <g transform="rotate(300)"> <ellipse cx="0" cy="-90" rx="34" ry="58"/></g>
    </g>
    <!-- Blütenmitte (warmer Goldton) -->
    <circle r="42" fill="#a67952"/>
    <circle r="42" fill="none" stroke="#5a3a24" stroke-width="6"/>
    <!-- Pollenpunkte -->
    <g fill="#5a3a24">
      <circle cx="-14" cy="-8" r="4"/>
      <circle cx="12"  cy="-12" r="4"/>
      <circle cx="0"   cy="10" r="4"/>
      <circle cx="-10" cy="14" r="4"/>
      <circle cx="14"  cy="8" r="4"/>
    </g>
  </g>
</svg>
